server {
    listen 80;
    
    # Ignore server tokens for security
    server_tokens off;

    # =========================================================================
    # Backend Routes
    # =========================================================================

    # Route all API requests to the 'backend' Spring Boot container on port 8080
    location /api/ {
        proxy_pass http://backend:8080/api/;
        
        # Forward headers so the backend knows the original request details
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route Swagger UI requests to the backend 
    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
        proxy_set_header Host $host;
    }

    # Route OpenAPI docs to the backend
    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
        proxy_set_header Host $host;
    }

    # =========================================================================
    # Frontend Routes
    # =========================================================================

    # Route all other traffic to the 'frontend' Vue app container on port 80
    location / {
        proxy_pass http://frontend:80/;
        
        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
